<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dmaret — Projets GitHub Pages</title>
<style>
  :root{--bg:#f5f0e8;--text:#2c2820;--text2:#6b6356;--text3:#a89e90;--line:#ddd8cf;--accent:#cc1155;--card:#fff;--shadow:rgba(0,0,0,.06);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:#1a1a1a;color:#f0ebe0;padding:48px 40px 40px;border-bottom:2px solid var(--accent);}
  header h1{font-size:28px;font-weight:300;letter-spacing:-.5px;}
  header h1 strong{font-weight:600;}
  header p{margin-top:8px;color:#a89e90;font-size:14px;}
  header .github-link{display:inline-flex;align-items:center;gap:6px;margin-top:16px;color:#c4a870;font-size:13px;text-decoration:none;border:0.5px solid #c4a870;border-radius:20px;padding:4px 12px;transition:background .15s;}
  header .github-link:hover{background:rgba(196,168,112,.1);}
  .status{max-width:860px;margin:0 auto;padding:24px 40px 0;font-size:12px;color:var(--text3);}
  .grid{max-width:860px;margin:0 auto;padding:24px 40px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:8px;padding:20px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s,transform .15s;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
  .card:hover{box-shadow:0 4px 20px var(--shadow);transform:translateY(-2px);}
  .card:hover::before{transform:scaleX(1);}
  .card-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
  .card-desc{font-size:12.5px;color:var(--text2);line-height:1.5;flex:1;}
  .card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .card-lang{font-size:10.5px;color:var(--text3);background:#f0ebe0;padding:2px 8px;border-radius:10px;}
  .card-stars{font-size:11px;color:var(--text3);}
  .card-url{font-size:11px;color:var(--accent);word-break:break-all;margin-top:4px;opacity:.7;}
  .card-updated{font-size:10px;color:var(--text3);text-align:right;margin-top:4px;}
  .pages-badge{font-size:9.5px;font-weight:500;background:#238636;color:#fff;padding:2px 7px;border-radius:10px;letter-spacing:.3px;flex-shrink:0;}
  .loading{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px;}
  .loading .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite;margin:0 3px;}
  .loading .dot:nth-child(2){animation-delay:.2s;}
  .loading .dot:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
  .empty{text-align:center;padding:60px 20px;color:var(--text3);}
  footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);border-top:0.5px solid var(--line);}
  @media(max-width:600px){header{padding:32px 20px 28px;}.grid{padding:20px;grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1><strong>dmaret</strong> — Projets</h1>
  <p>Pages web publiées via GitHub Pages</p>
  <a class="github-link" href="https://github.com/dmaret" target="_blank" rel="noopener">↗ github.com/dmaret</a>
</header>
<div class="status" id="status"></div>
<div class="grid" id="grid">
  <div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span><br><br>Chargement…</div>
</div>
<footer>Données chargées via l'API GitHub · Mis à jour automatiquement</footer>
<script>
const U='dmaret';
async function fetchRepos(){const r=[];let p=1;while(true){const res=await fetch(`https://api.github.com/users/${U}/repos?per_page=100&page=${p}&sort=updated`);if(!res.ok)throw new Error('API '+res.status);const d=await res.json();if(!d.length)break;r.push(...d);if(d.length<100)break;p++;}return r;}
function ago(s){const d=Math.floor((Date.now()-new Date(s))/86400000);if(d===0)return"aujourd'hui";if(d===1)return"hier";if(d<30)return`il y a ${d}j`;const m=Math.floor(d/30);if(m<12)return`il y a ${m} mois`;return`il y a ${Math.floor(m/12)} an(s)`;}
function card(repo,url){return`<a class="card" href="${url}" target="_blank"><div class="card-name">${repo.name}<span class="pages-badge">● Pages</span></div><div class="card-desc">${repo.description||'Pas de description'}</div><div class="card-url">${url}</div><div class="card-meta">${repo.language?`<span class="card-lang">${repo.language}</span>`:'<span></span>'}${repo.stargazers_count>0?`<span class="card-stars">★ ${repo.stargazers_count}</span>`:'<span></span>'}</div><div class="card-updated">Mis à jour ${ago(repo.updated_at)}</div></a>`;}
async function main(){const grid=document.getElementById('grid'),status=document.getElementById('status');try{const repos=await fetchRepos();const found=repos.filter(r=>r.has_pages);grid.innerHTML=found.length?found.map(r=>{const url=r.name===`${U}.github.io`?`https://${U}.github.io/`:`https://${U}.github.io/${r.name}/`;return card(r,url);}).join(''):'<div class="empty">Aucun projet avec GitHub Pages trouvé.</div>';status.textContent=found.length?`${found.length} projet(s) avec GitHub Pages`:'';} catch(e){grid.innerHTML=`<div class="empty">Erreur: ${e.message}</div>`;status.textContent='';}}
main();
</script>
